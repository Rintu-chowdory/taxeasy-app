apiVersion: v1
kind: Service
metadata:
  name: devops-portfolio
  namespace: default
  labels:
    app: devops-portfolio
spec:
  type: LoadBalancer
  selector:
    app: devops-portfolio
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
    - name: https
      port: 443
      targetPort: 3000
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
