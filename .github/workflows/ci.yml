name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Flask smoke test
        run: |
          pipe install flask flask-cors gunicorn
          python app.py &
          sleep 3
          curl -f http://localhost:5000/health

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install & build
        run: |
          npm install
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t devops-portfolio .

      - name: Start services
        run: docker compose up -d

      - name: Health check
        run: |
          sleep 5
          curl -f http://localhost/health

      - name: Tear down
        run: docker compose down
