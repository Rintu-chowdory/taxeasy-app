<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevOps Portfolio</title>
    <script>
      // GitHub Pages SPA redirect
      // This script handles client-side routing for single-page applications
      const path = decodeURIComponent(window.location.pathname);
      const pathSegments = path.split('/').filter(Boolean);
      
      // Store the original path for the SPA to handle
      if (pathSegments.length > 0 && pathSegments[0] === 'devops-portfolio-ci-cd') {
        // Remove the repo name from the path
        const redirectPath = '/' + pathSegments.slice(1).join('/');
        sessionStorage.redirect = redirectPath;
      } else {
        sessionStorage.redirect = path;
      }
      
      // Redirect to index.html
      window.location.href = '/devops-portfolio-ci-cd/';
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
